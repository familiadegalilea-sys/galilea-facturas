<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1A3A5C">
  <title>Nueva Factura – Galilea</title>
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="app-wrapper">
  <header class="app-header">
    <a href="facturas.html" class="btn-icono" title="Volver">‹</a>
    <div>
      <h1>Nueva Factura</h1>
    </div>
    <div style="width:40px"></div>
  </header>

  <main class="contenido">

    <!-- Mensaje de error global -->
    <div id="mensaje-error" class="mensaje-error"></div>

    <!-- Paso 1: Imágenes -->
    <div class="seccion">
      <h2>1 · Imágenes</h2>

      <div class="grupo-botones">
        <button id="btn-subir-archivo" class="btn btn-secundario">
          📎 Subir archivo
        </button>
        <button id="btn-tomar-foto" class="btn btn-secundario">
          📷 Tomar foto
        </button>
      </div>

      <!-- Inputs ocultos -->
      <input
        type="file"
        id="input-archivo"
        accept="image/*,application/pdf"
        multiple
      >
      <input
        type="file"
        id="input-camara"
        accept="image/*"
        capture="environment"
      >

      <!-- Miniaturas de las imágenes agregadas -->
      <div id="filas-miniaturas" class="filas-miniaturas"></div>
    </div>

    <!-- Paso 2: Extraer datos -->
    <div class="seccion">
      <h2>2 · Extraer datos</h2>

      <!-- Spinner (visible mientras se procesa) -->
      <div id="spinner" class="spinner-contenedor">
        <div class="spinner"></div>
        <span class="spinner-texto">Analizando factura…</span>
      </div>

      <button id="btn-extraer" class="btn btn-acento btn-bloque" style="display:none">
        ✨ Extraer datos
      </button>
    </div>

    <!-- Paso 3: Formulario y guardar (oculto hasta que se extraigan los datos) -->
    <div id="seccion-formulario" class="seccion" style="display:none">
      <h2>3 · Revisar y guardar</h2>

      <div class="grupo-form">
        <label for="fecha_emision">Fecha de emisión</label>
        <input type="date" id="fecha_emision" name="fecha_emision">
      </div>

      <div class="grupo-form">
        <label for="numero_factura">Número de factura</label>
        <input type="text" id="numero_factura" name="numero_factura" placeholder="Ej: 0001-00001234">
      </div>

      <div class="grupo-form">
        <label for="proveedor">Proveedor</label>
        <input type="text" id="proveedor" name="proveedor" placeholder="Nombre o razón social">
      </div>

      <div class="grupo-form">
        <label for="cuit_proveedor">CUIT Proveedor</label>
        <input type="text" id="cuit_proveedor" name="cuit_proveedor" placeholder="XX-XXXXXXXX-X">
      </div>

      <div class="grupo-form">
        <label for="concepto">Concepto</label>
        <input type="text" id="concepto" name="concepto" placeholder="Descripción del servicio o producto">
      </div>

      <div class="grupo-form">
        <label for="importe_total">Importe Total</label>
        <input type="number" id="importe_total" name="importe_total" placeholder="0.00" step="0.01" min="0">
      </div>

      <div class="grupo-form">
        <label for="cuit_destinatario">CUIT Destinatario</label>
        <input type="text" id="cuit_destinatario" name="cuit_destinatario" placeholder="XX-XXXXXXXX-X">
      </div>

      <button id="btn-guardar" class="btn btn-primario btn-bloque mt-16">
        💾 Guardar factura
      </button>
    </div>

  </main>
</div>

<!-- Dependencias -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="js/config.js"></script>
<script src="js/drive.js"></script>
<script src="js/nueva-factura.js"></script>
</body>
</html>
