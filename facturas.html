<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1A3A5C">
  <title>Facturas – Galilea</title>
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="app-wrapper">
  <header class="app-header">
    <div>
      <h1>Galilea Facturas</h1>
      <div class="subtitulo">Historial</div>
    </div>
    <button id="btn-cerrar" class="btn-icono" title="Cerrar sesión">⏻</button>
  </header>

  <main class="contenido">
    <div class="barra-busqueda">
      <span class="icono-busqueda">🔍</span>
      <input
        type="search"
        id="busqueda"
        placeholder="Buscar por proveedor o número…"
        autocomplete="off"
      >
    </div>

    <div class="filtros-fecha">
      <div class="filtro-fecha-campo">
        <label for="filtro-desde">Desde</label>
        <input type="date" id="filtro-desde">
      </div>
      <div class="filtro-fecha-campo">
        <label for="filtro-hasta">Hasta</label>
        <input type="date" id="filtro-hasta">
      </div>
    </div>

    <div class="filtros-acciones">
      <button id="btn-limpiar-filtros" class="btn-limpiar-filtros">Limpiar filtros</button>
      <button id="btn-descargar-excel" class="btn btn-secundario btn-descargar-excel">
        📥 Descargar Excel
      </button>
    </div>

    <p id="sin-resultados" class="sin-resultados">No se encontraron facturas.</p>

    <div id="lista-facturas" class="lista-facturas">
      <p class="cargando">Cargando facturas…</p>
    </div>
  </main>

  <!-- Botón flotante para nueva factura -->
  <a href="nueva-factura.html" class="fab" title="Nueva factura">＋</a>
</div>

<!-- Modal de confirmación para eliminar -->
<div id="modal-overlay" class="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
    <h2 id="modal-titulo" class="modal-titulo">Eliminar factura</h2>
    <p class="modal-texto">¿Seguro que querés eliminar esta factura? Esta acción no se puede deshacer.</p>
    <div class="modal-acciones">
      <button id="modal-cancelar" class="btn btn-secundario">Cancelar</button>
      <button id="modal-confirmar" class="btn btn-eliminar">Eliminar</button>
    </div>
  </div>
</div>

<!-- Toast de confirmación -->
<div id="toast" class="toast" hidden>Factura eliminada</div>

<!-- Dependencias -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/facturas.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
